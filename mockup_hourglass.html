<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Hourglass Design Mockups</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0a0f1e;
  color: #e2e8f0;
  font-family: 'Segoe UI', Meiryo, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 28px 16px 56px;
  min-height: 100vh;
}
h1 { font-size: 22px; letter-spacing: 0.05em; margin-bottom: 6px; }
.sub { color: #475569; font-size: 12px; margin-bottom: 36px; }
.row { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; }

.card {
  background: #131c30;
  border-radius: 20px;
  border: 1px solid #1e2d45;
  padding: 20px 14px 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  width: 206px;
}
.badge {
  font-size: 10px;
  font-weight: 700;
  padding: 3px 12px;
  border-radius: 99px;
  letter-spacing: 0.06em;
}
.title { font-size: 15px; font-weight: 700; }
.desc { font-size: 11.5px; color: #64748b; line-height: 1.75; text-align: center; }
.note { font-weight: 600; }
</style>
</head>
<body>
<h1>⏳ Hourglass 構造デザイン案</h1>
<p class="sub">実装前ビジュアルモックアップ ── オレンジ線 = 液体の流れ路 ／ 黄枠 = ギミックスペース</p>

<div class="row">

<!-- ========== 案A: ユーザースケッチ準拠 ========== -->
<div class="card">
  <span class="badge" style="background:#1e3a8a;color:#93c5fd">▶ 提案案（スケッチ準拠）</span>
  <span class="title" style="color:#60a5fa">案A　バッフル型</span>

  <svg width="178" height="440" viewBox="0 0 178 440">
    <defs>
      <marker id="arrA" viewBox="0 0 10 10" refX="9" refY="5"
              markerWidth="5" markerHeight="5" orient="auto">
        <path d="M 0 1 L 9 5 L 0 9 Z" fill="#f97316"/>
      </marker>
    </defs>

    <!-- 外側コンテナ（矩形タンク）-->
    <rect x="12" y="8" width="154" height="424" rx="11"
          fill="rgba(96,165,250,0.04)" stroke="#60a5fa" stroke-width="2.2"/>

    <!-- ギミックゾーン -->
    <rect x="30" y="196" width="118" height="48" rx="7"
          fill="rgba(251,191,36,0.1)" stroke="#fbbf24" stroke-width="1.3" stroke-dasharray="6,4"/>
    <text x="89" y="216" text-anchor="middle" fill="#fbbf24" font-size="9.5" font-weight="700">GIMMICK SPACE</text>
    <text x="89" y="233" text-anchor="middle" fill="#fbbf24" font-size="9">ここにギミックを配置</text>

    <!-- 左バッフル 1（y=100）-->
    <path d="M 12,100 C 55,72 148,78 158,100 C 148,122 55,128 12,100 Z"
          fill="rgba(96,165,250,0.22)" stroke="#60a5fa" stroke-width="1.8"/>
    <!-- 左バッフル 2（y=162）-->
    <path d="M 12,162 C 55,134 148,140 158,162 C 148,184 55,190 12,162 Z"
          fill="rgba(96,165,250,0.22)" stroke="#60a5fa" stroke-width="1.8"/>

    <!-- 右バッフル 3（y=258）-->
    <path d="M 166,258 C 123,230 30,236 20,258 C 30,280 123,286 166,258 Z"
          fill="rgba(96,165,250,0.22)" stroke="#60a5fa" stroke-width="1.8"/>
    <!-- 右バッフル 4（y=320）-->
    <path d="M 166,320 C 123,292 30,298 20,320 C 30,342 123,348 166,320 Z"
          fill="rgba(96,165,250,0.22)" stroke="#60a5fa" stroke-width="1.8"/>

    <!-- 流れ路（右ギャップ → 折り返し → 左ギャップ）-->
    <!-- 上から右隙間へ -->
    <path d="M 89,18 L 89,60 Q 165,60 165,80"
          fill="none" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5,4"/>
    <!-- 右隙間を下へ（バッフル1・2の右通過）-->
    <path d="M 165,122 L 165,175"
          fill="none" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrA)"/>
    <!-- 折り返して左へ（ギミックスペースを横断）-->
    <path d="M 165,184 Q 165,244 13,244"
          fill="none" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrA)"/>
    <!-- 左隙間を下へ（バッフル3・4の左通過）-->
    <path d="M 13,280 L 13,365"
          fill="none" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrA)"/>
    <!-- 底へ -->
    <path d="M 13,366 Q 13,422 89,422"
          fill="none" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrA)"/>

    <!-- 流れラベル -->
    <text x="170" y="150" fill="#f97316" font-size="10">→</text>
    <text x="8"   y="320" fill="#f97316" font-size="10">←</text>
  </svg>

  <p class="desc">
    左バッフル×2（上半）<br>
    右バッフル×2（下半）<br>
    S字スラローム流路<br>
    <span class="note" style="color:#60a5fa">→ スケッチに最も近い</span>
  </p>
</div>

<!-- ========== 案B: 3段交互シングルフィン ========== -->
<div class="card">
  <span class="badge" style="background:#3b0764;color:#e9d5ff">シンプル3段</span>
  <span class="title" style="color:#c084fc">案B　3段交互型</span>

  <svg width="178" height="440" viewBox="0 0 178 440">
    <defs>
      <marker id="arrB" viewBox="0 0 10 10" refX="9" refY="5"
              markerWidth="5" markerHeight="5" orient="auto">
        <path d="M 0 1 L 9 5 L 0 9 Z" fill="#f97316"/>
      </marker>
    </defs>

    <!-- 外側コンテナ -->
    <rect x="12" y="8" width="154" height="424" rx="11"
          fill="rgba(192,132,252,0.04)" stroke="#c084fc" stroke-width="2.2"/>

    <!-- ギミックゾーン -->
    <rect x="30" y="196" width="118" height="48" rx="7"
          fill="rgba(251,191,36,0.1)" stroke="#fbbf24" stroke-width="1.3" stroke-dasharray="6,4"/>
    <text x="89" y="216" text-anchor="middle" fill="#fbbf24" font-size="9.5" font-weight="700">GIMMICK SPACE</text>
    <text x="89" y="233" text-anchor="middle" fill="#fbbf24" font-size="9">ここにギミックを配置</text>

    <!-- 段1: 左バッフル（y=110）-->
    <path d="M 12,110 C 55,80 152,87 162,110 C 152,133 55,140 12,110 Z"
          fill="rgba(192,132,252,0.22)" stroke="#c084fc" stroke-width="1.8"/>

    <!-- 段2: 右バッフル（y=220 ≒ 中央）-->
    <path d="M 166,290 C 123,260 26,267 16,290 C 26,313 123,320 166,290 Z"
          fill="rgba(192,132,252,0.22)" stroke="#c084fc" stroke-width="1.8"/>

    <!-- 段3: 左バッフル（y=370）-->
    <path d="M 12,370 C 55,340 152,347 162,370 C 152,393 55,400 12,370 Z"
          fill="rgba(192,132,252,0.22)" stroke="#c084fc" stroke-width="1.8"/>

    <!-- 流れ路 -->
    <path d="M 89,18 L 89,60 Q 166,60 166,90"
          fill="none" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5,4"/>
    <path d="M 166,130 L 166,196 Q 166,244 13,244 L 13,270"
          fill="none" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrB)"/>
    <path d="M 13,312 L 13,348 Q 13,400 166,400 L 166,410 Q 166,422 89,422"
          fill="none" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrB)"/>

    <text x="170" y="113" fill="#f97316" font-size="10">→</text>
    <text x="6"   y="293" fill="#f97316" font-size="10">←</text>
    <text x="170" y="373" fill="#f97316" font-size="10">→</text>
  </svg>

  <p class="desc">
    1枚バッフル×3（左・右・左）<br>
    真の「3段」構造<br>
    流路が広く詰まりにくい<br>
    <span class="note" style="color:#c084fc">→ 中央スペース最大化◎</span>
  </p>
</div>

<!-- ========== 案C: 砂時計外形 + 内部バッフル ========== -->
<div class="card">
  <span class="badge" style="background:#14532d;color:#86efac">砂時計外形を維持</span>
  <span class="title" style="color:#4ade80">案C　ひょうたん＋バッフル</span>

  <svg width="178" height="440" viewBox="0 0 178 440">
    <defs>
      <marker id="arrC" viewBox="0 0 10 10" refX="9" refY="5"
              markerWidth="5" markerHeight="5" orient="auto">
        <path d="M 0 1 L 9 5 L 0 9 Z" fill="#f97316"/>
      </marker>
    </defs>

    <!-- 砂時計外形（伝統的シルエット、くびれを広めに）-->
    <path d="M 12,8  L 166,8  L 166,160  L 108,206 L 108,234 L 166,280 L 166,432
             L 12,432 L 12,280 L 70,234 L 70,206 L 12,160 Z"
          fill="rgba(74,222,128,0.04)" stroke="#4ade80" stroke-width="2.2"/>

    <!-- ギミックゾーン（くびれ部）-->
    <rect x="58" y="198" width="62" height="44" rx="7"
          fill="rgba(251,191,36,0.14)" stroke="#fbbf24" stroke-width="1.3" stroke-dasharray="5,3"/>
    <text x="89" y="217" text-anchor="middle" fill="#fbbf24" font-size="8.5" font-weight="700">GIMMICK</text>
    <text x="89" y="232" text-anchor="middle" fill="#fbbf24" font-size="8.5">SPACE</text>

    <!-- 上バルブ: 左バッフル（y=95）-->
    <path d="M 12,95 C 52,68 148,74 156,95 C 148,116 52,122 12,95 Z"
          fill="rgba(74,222,128,0.22)" stroke="#4ade80" stroke-width="1.8"/>
    <!-- 上バルブ: 右バッフル（y=148）-->
    <path d="M 166,148 C 126,121 30,127 22,148 C 30,169 126,175 166,148 Z"
          fill="rgba(74,222,128,0.22)" stroke="#4ade80" stroke-width="1.8"/>

    <!-- 下バルブ: 左バッフル（y=292）-->
    <path d="M 12,292 C 52,265 148,271 156,292 C 148,313 52,319 12,292 Z"
          fill="rgba(74,222,128,0.22)" stroke="#4ade80" stroke-width="1.8"/>
    <!-- 下バルブ: 右バッフル（y=345）-->
    <path d="M 166,345 C 126,318 30,324 22,345 C 30,366 126,372 166,345 Z"
          fill="rgba(74,222,128,0.22)" stroke="#4ade80" stroke-width="1.8"/>

    <!-- 流れ路 -->
    <path d="M 89,18 Q 160,18 160,75"
          fill="none" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5,4"/>
    <path d="M 20,117 L 20,148 Q 20,200 70,210"
          fill="none" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrC)"/>
    <path d="M 108,230 Q 160,242 160,270"
          fill="none" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5,4"/>
    <path d="M 20,314 L 20,370 Q 20,422 89,422"
          fill="none" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrC)"/>

    <text x="162" y="98"  fill="#f97316" font-size="10">→</text>
    <text x="6"   y="151" fill="#f97316" font-size="10">←</text>
    <text x="162" y="295" fill="#f97316" font-size="10">→</text>
    <text x="6"   y="348" fill="#f97316" font-size="10">←</text>
  </svg>

  <p class="desc">
    砂時計シルエット維持<br>
    バルブ内に2段バッフル×2<br>
    くびれがギミックゾーン<br>
    <span class="note" style="color:#94a3b8">→ 見た目は砂時計らしい</span>
  </p>
</div>

</div><!-- /row -->
</body>
</html>
